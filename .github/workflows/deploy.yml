name: Deploy Backend to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" << 'EOF'
            set -e

            echo "📥 Pulling latest code..."
            cd /home/ubuntu/worker-community

            git pull origin main

            echo "📦 Installing dependencies..."
            cd server

            npm install

            echo "🚀 Reloading PM2..."
            pm2 reload commun-api --update-env

            echo "⏳ Waiting for application to start..."
            sleep 10

            echo "❤️ Local Health Check..."
            curl --fail http://localhost:3000

            echo ""
            echo "🌍 Public Health Check..."
            curl --fail https://api.commun.in

            echo ""
            echo "📊 PM2 Status"
            pm2 list

            echo ""
            echo "🎉 Deployment completed successfully!"
          EOF